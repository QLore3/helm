apiVersion: apps/v1

kind: Deployment

metadata:
  name: {{ .Release.Name }}-backend

spec:
  replicas: {{ .Values.backend.replicaCount }}

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"

          args:
            - "-text={{ .Values.backend.text }}"

          ports:
            - containerPort: 5678
